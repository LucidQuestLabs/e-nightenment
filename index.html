<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>E-Nightenment</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell" aria-labelledby="game-title">
      <header class="topbar">
        <div>
          <p class="kicker">Browser koan arcade</p>
          <h1 id="game-title">E-Nightenment</h1>
        </div>
        <div class="run-controls">
          <p id="nightCounter" class="night-counter" aria-live="polite">Night 1 / 8</p>
          <button id="resetButton" class="plain-button" type="button">New Run</button>
        </div>
      </header>

      <section class="playfield" aria-label="Night garden">
        <canvas id="skyCanvas" width="1280" height="900" aria-hidden="true"></canvas>
        <div class="scene-readout">
          <p id="omenLabel" class="kicker">Omen</p>
          <h2 id="omenTitle">Loading the lantern...</h2>
          <p id="omenText"></p>
        </div>
      </section>

      <aside class="control-panel" aria-label="Game choices and state">
        <section class="meters" aria-label="Inner weather">
          <div class="meter" data-stat="glow">
            <div class="meter-label">
              <span>Glow</span>
              <strong id="glowValue">50</strong>
            </div>
            <div class="meter-track"><span id="glowBar"></span></div>
          </div>
          <div class="meter" data-stat="hush">
            <div class="meter-label">
              <span>Hush</span>
              <strong id="hushValue">50</strong>
            </div>
            <div class="meter-track"><span id="hushBar"></span></div>
          </div>
          <div class="meter" data-stat="spark">
            <div class="meter-label">
              <span>Spark</span>
              <strong id="sparkValue">50</strong>
            </div>
            <div class="meter-track"><span id="sparkBar"></span></div>
          </div>
          <div class="meter" data-stat="shadow">
            <div class="meter-label">
              <span>Shadow</span>
              <strong id="shadowValue">50</strong>
            </div>
            <div class="meter-track"><span id="shadowBar"></span></div>
          </div>
        </section>

        <section class="choices" aria-label="Available responses">
          <div class="panel-heading">
            <p class="kicker">Choose your posture</p>
            <p id="glintCounter" class="glints">0 glints</p>
          </div>
          <div id="choiceList" class="choice-list"></div>
          <div id="resultPane" class="result-pane" hidden>
            <p class="kicker">The night answers</p>
            <p id="resultText"></p>
            <button id="continueButton" class="primary-button" type="button">Continue</button>
          </div>
        </section>

        <section class="journal" aria-label="Lantern journal">
          <div class="panel-heading">
            <p class="kicker">Lantern journal</p>
            <p id="balanceLabel">Unlit</p>
          </div>
          <ol id="journalList"></ol>
        </section>
      </aside>
    </main>

    <div id="endingOverlay" class="ending-overlay" hidden>
      <section class="ending-dialog" aria-labelledby="endingTitle" aria-modal="true" role="dialog">
        <p class="kicker">Dawn arrives sideways</p>
        <h2 id="endingTitle"></h2>
        <p id="endingText"></p>
        <dl class="ending-score">
          <div>
            <dt>Glints</dt>
            <dd id="endingGlints"></dd>
          </div>
          <div>
            <dt>Balance</dt>
            <dd id="endingBalance"></dd>
          </div>
        </dl>
        <button id="endingResetButton" class="primary-button" type="button">Play Again</button>
      </section>
    </div>

    <script src="game.js"></script>
  </body>
</html>
